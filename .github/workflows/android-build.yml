name: Android CI Build

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Find Project and Build
      run: |
        # این دستور تمام پوشه‌ها را می‌گردد تا فایل اجرای اندروید را پیدا کند
        GRADLE_PATH=$(find . -name "gradlew" | head -n 1)
        
        if [ -z "$GRADLE_PATH" ]; then
          echo "❌ خطا: فایل gradlew در هیچکدام از پوشه‌های شما پیدا نشد!"
          echo "لطفا مطمئن شوید که سورس اندروید استودیو را کامل آپلود کرده‌اید."
          exit 1
        fi
        
        DIR_NAME=$(dirname "$GRADLE_PATH")
        echo "✅ پروژه اندروید با موفقیت در پوشه $DIR_NAME پیدا شد."
        
        cd "$DIR_NAME"
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload All APKs
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: my-app-apk
        path: '**/*.apk'
